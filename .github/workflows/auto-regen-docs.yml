# auto-regen-docs.yml
# コードが変更されたら影響のあるドキュメント章を自動再生成する
# Private リポジトリでのみ動作する
#
# 手動トリガー専用（push時自動実行は負荷が大きいため）

name: "Auto Regenerate Docs"

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'プロジェクト名（docs/{name}-index.md の {name}）'
        required: true
      source_dir:
        description: '分析対象のソースディレクトリ（リポジトリルートからの相対パス）'
        required: true
      mode:
        description: '再生成モード'
        required: true
        default: 'diff'
        type: choice
        options:
          - diff    # 変更があった章のみ
          - full    # 全章再生成

permissions:
  contents: read
  issues: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.private }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Detect changes (diff mode)
        id: diff
        if: ${{ inputs.mode == 'diff' }}
        run: |
          echo "## Diff Analysis" > /tmp/diff-report.md
          echo "" >> /tmp/diff-report.md

          python3 scripts/diff_update.py \
            --source-dir "${{ inputs.source_dir }}" \
            --docs-dir ./docs \
            --dry-run \
            > /tmp/diff-output.txt 2>&1 || true

          cat /tmp/diff-output.txt >> /tmp/diff-report.md

          echo "report_path=/tmp/diff-report.md" >> "$GITHUB_OUTPUT"

      - name: List all chapters (full mode)
        id: full
        if: ${{ inputs.mode == 'full' }}
        run: |
          echo "## Full Regeneration Plan" > /tmp/diff-report.md
          echo "" >> /tmp/diff-report.md
          echo "All chapters in \`docs/manual/${{ inputs.name }}/\` will be regenerated:" >> /tmp/diff-report.md
          echo "" >> /tmp/diff-report.md

          if [ -d "docs/manual/${{ inputs.name }}" ]; then
            for f in docs/manual/${{ inputs.name }}/*.md; do
              echo "- \`$(basename "$f")\`" >> /tmp/diff-report.md
            done
          else
            echo "- (No existing manual directory found)" >> /tmp/diff-report.md
          fi

          echo "report_path=/tmp/diff-report.md" >> "$GITHUB_OUTPUT"

      - name: Build regeneration summary
        id: summary
        run: |
          REPORT_PATH="${{ steps.diff.outputs.report_path || steps.full.outputs.report_path }}"

          if [ -z "$REPORT_PATH" ] || [ ! -f "$REPORT_PATH" ]; then
            echo "No report generated."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "--- Regeneration Report ---"
          cat "$REPORT_PATH"

      - name: Create regeneration issue
        if: steps.summary.outputs.has_changes == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const name = '${{ inputs.name }}';
            const mode = '${{ inputs.mode }}';
            const sourceDir = '${{ inputs.source_dir }}';

            const reportPath = '${{ steps.diff.outputs.report_path || steps.full.outputs.report_path }}';
            let reportContent = '';
            if (reportPath && fs.existsSync(reportPath)) {
              reportContent = fs.readFileSync(reportPath, 'utf8');
            }

            const title = `docs: ${name} ドキュメント再生成が必要です (${mode} mode)`;

            // 同じタイトルの open issue があれば作成しない
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'documentation'
            });
            if (existing.data.some(i => i.title === title)) {
              console.log('既存の issue があるためスキップ');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['documentation'],
              body: `## ドキュメント再生成プラン

            **プロジェクト:** \`${name}\`
            **ソースディレクトリ:** \`${sourceDir}\`
            **モード:** \`${mode}\`
            **トリガー:** @${context.actor} による手動実行

            ${reportContent}

            ## 再生成手順

            Claude Code で以下を実行してください:

            \`\`\`
            /project:update ${name} --source-dir ${sourceDir} --mode ${mode}
            \`\`\`

            または手動で:

            \`\`\`bash
            # 1. 変更検出
            python3 scripts/diff_update.py --source-dir ${sourceDir} --docs-dir ./docs

            # 2. Claude Code で該当章を再生成
            # （diff_update.py の出力に従い、影響のある章のみ再生成）
            \`\`\`

            > **Note:** ドキュメントの実際の再生成には Claude Code が必要です。
            > この Issue は変更検出結果と再生成プランを提供します。

            ---
            *この Issue は [auto-regen-docs](/.github/workflows/auto-regen-docs.yml) により自動作成されました。*`
            });
